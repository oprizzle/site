<section class="contact" id="contact">
  <div class="container">
    <div class="grid">
      <div class="contact-copy">
        <span class="label">Let&rsquo;s talk</span>
        <h2>Turn your inventory into growth capital.</h2>
        <p>A fifteen-minute call and a quick share of your data is usually all it takes to see how much capital you&rsquo;ve been leaving on the warehouse shelf.</p>
        <div class="contact-cta">
          <a class="btn btn-primary" href="mailto:info@figabl.com?subject=Book%20a%20call">Book a call</a>
          <a class="btn btn-outline light" href="mailto:info@figabl.com">Email our team</a>
        </div>
      </div>
      <div class="form-card">
        <form>
          <div class="form-group"><label>Company</label><input type="text" placeholder="Your company"></div>
          <div class="form-row">
            <div class="form-group"><label>First name</label><input type="text"></div>
            <div class="form-group"><label>Last name</label><input type="text"></div>
          </div>
          <div class="form-group"><label>Email</label><input type="email"></div>
          <div class="form-group"><label>Message</label><textarea placeholder="Tell us a little about your business"></textarea></div>
          <button class="btn btn-primary" type="submit">Submit</button>
        </form>
      </div>
    </div>
  </div>
</section>
